# Serves the built SPA. Traefik routes /api straight to the API container (a higher-priority
# router), so anything reaching nginx is a frontend asset or a client-side route — hence the
# index.html fallback. No /api handling needed here.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

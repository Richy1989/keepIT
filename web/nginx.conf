# Serves the built SPA and reverse-proxies the API, so the whole app is one origin (no CORS, the
# refresh cookie is same-origin). /api is forwarded to the API container; everything else is a
# frontend asset or a client-side route, hence the index.html fallback.

# Map the Upgrade header so WebSocket requests upgrade and normal requests keep alive (SignalR).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't advertise the nginx version in responses/error pages.
    server_tokens off;

    # ---- Security headers (this instance may be exposed to the internet behind Traefik) ----
    # NOTE: nginx `add_header` inheritance is all-or-nothing — any location that sets its own
    # add_header (like /assets/ below) drops these and must repeat what it needs.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Browsers ignore HSTS on plain-http responses, so this is inert for local/LAN use and becomes
    # effective automatically once the site is served through TLS (Traefik).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # script 'unsafe-inline': index.html carries the pre-paint theme script.
    # style 'unsafe-inline': note colors are React inline style attributes.
    # connect-src 'self' covers same-origin fetch and the SignalR websocket (CSP3).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Forward API calls to the backend container. The /api prefix is preserved (the API routes
    # live under /api). Forwarded headers let the API recover the real client IP/scheme.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade for SignalR realtime.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Long-cache fingerprinted assets. add_header here suppresses the server-level set, so repeat
    # the ones that matter for static files (CSP/X-Frame-Options are document-level — not needed).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

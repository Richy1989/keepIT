# keepIT — full stack in Docker (ARCHITECTURE.md "Deployment").
#
#   docker compose up --build
#   → open http://localhost:8080
#
# The web container (nginx) is the single entrypoint on :8080: it serves the SPA and reverse-proxies
# /api to the API container. Because both are served from one origin there's no CORS in the stack,
# and the refresh cookie is same-origin. The API itself is not published to the host — only nginx is.
# Copy .env.example to .env first (sets JWT_KEY).

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: keepit
      POSTGRES_USER: keepit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keepit}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepit -d keepit"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [keepit]

  api:
    build:
      context: ./keepIT
      dockerfile: keepITCore/Dockerfile
    # The base image runs as a non-root user that can't write a freshly-created named volume.
    # Running as root keeps the dev stack working out of the box; in production, provision the
    # data volume with the right ownership and drop back to the non-root user.
    user: root
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      # Postgres is configured, so the API uses it (SQLite is only the bare-metal dev fallback).
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=keepit;Username=keepit;Password=${POSTGRES_PASSWORD:-keepit}
      # REQUIRED: a >=32-char random secret. Set JWT_KEY in .env.
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env (a random secret of at least 32 characters)}
      Jwt__Issuer: keepITCore
      Jwt__Audience: keepIT.api
      App__DataRoot: /data
      # Refresh cookie is Secure (HTTPS-only) by default — correct when TLS is terminated by a
      # reverse proxy in front (e.g. Traefik). Browsers also treat http://localhost as secure, so
      # the localhost dev flow works. Set REFRESH_COOKIE_SECURE=false in .env only if you access
      # this stack over plain HTTP on a non-localhost address (e.g. a LAN IP), or the browser drops
      # the cookie and silent refresh fails.
      Auth__RefreshCookie__Secure: ${REFRESH_COOKIE_SECURE:-true}
      # Number of trusted reverse-proxy hops in front of the API; the API uses it to recover the
      # real client IP from X-Forwarded-For (which the per-IP rate limiter keys on). This file as
      # written is one hop (browser → nginx → api). If you front it with another proxy such as
      # Traefik (Traefik → nginx → api), set FORWARDED_PROXY_HOPS=2 in .env — otherwise every
      # request is attributed to the proxy's IP and all clients share one rate-limit bucket.
      App__ForwardedProxyHops: ${FORWARDED_PROXY_HOPS:-1}
    volumes:
      - app-data:/data
    depends_on:
      db:
        condition: service_healthy
    networks: [keepit]

  web:
    build:
      context: ./web
    # nginx serves the SPA and proxies /api to the api service (see web/nginx.conf).
    ports:
      - "8080:80"
    depends_on: [api]
    networks: [keepit]

  # Caching / SignalR backplane — add when needed (ARCHITECTURE.md). Not required for the core app.
  # redis:
  #   image: redis:7-alpine
  #   networks: [keepit]

volumes:
  db-data:
  app-data:

networks:
  keepit:

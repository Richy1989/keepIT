# Single-container nginx: serve the SPA and reverse-proxy /api to the co-located API on loopback.
# Same origin → no CORS, the refresh cookie is same-origin. /api is forwarded to the local API
# process; everything else is a frontend asset or a client-side route (index.html fallback).

# Map the Upgrade header so WebSocket requests upgrade and normal requests keep alive (SignalR).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the API running inside this same container.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (for SignalR realtime, when added).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
